<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CI-AGENT / CI Dashboard</title>
<link rel="stylesheet" href="assets/colors_and_type.css" />
<style>
/* ===================== THEME TOKENS ===================== */
:root[data-theme="light"] {
  --app-bg:#EEF1F0; --app-rail:#FFFFFF; --app-panel:#FFFFFF; --app-panel-2:#F6F8F7;
  --app-border:#E2E6E4; --app-border-2:#ECEFEE;
  --app-text:#161616; --app-text-soft:#6F6F6F; --app-text-mute:#9AA3A0;
  --app-head:#003A40; --app-rail-text:#3A4744; --app-rail-active-bg:#EAFBF3;
  --app-shadow:0 1px 2px rgba(0,32,38,.04), 0 4px 16px rgba(0,32,38,.05);
}
:root[data-theme="dark"] {
  --app-bg:#001F22; --app-rail:#002C30; --app-panel:#073439; --app-panel-2:#0A3C42;
  --app-border:rgba(255,255,255,.10); --app-border-2:rgba(255,255,255,.06);
  --app-text:#FFFFFF; --app-text-soft:rgba(255,255,255,.62); --app-text-mute:rgba(255,255,255,.38);
  --app-head:#FFFFFF; --app-rail-text:rgba(255,255,255,.66); --app-rail-active-bg:rgba(0,209,128,.14);
  --app-shadow:0 1px 2px rgba(0,0,0,.2), 0 6px 22px rgba(0,0,0,.28);
}

* { box-sizing:border-box; }
html,body { margin:0; }
body { background:var(--app-bg); font-family:var(--font-sans); color:var(--app-text);
  transition:background .25s var(--ease), color .25s var(--ease); }
.app { display:grid; grid-template-columns:248px 1fr; min-height:100vh; }

/* ===================== RAIL ===================== */
.rail { background:var(--app-rail); border-right:1px solid var(--app-border);
  display:flex; flex-direction:column; padding:24px 16px; gap:4px; transition:background .25s, border-color .25s;
  position:sticky; top:0; height:100vh; align-self:start; overflow-y:auto; }
.rail-logo { color:var(--app-head); padding:6px 10px 2px; }
:root[data-theme="dark"] .rail-logo { color:#fff; }
.rail-tag { font:700 11px/1 var(--font-sans); letter-spacing:.12em; text-transform:uppercase;
  color:var(--app-text-mute); padding:0 10px 18px; }
.rail-nav { display:flex; flex-direction:column; gap:2px; flex:1; }
.rail-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border:0; background:transparent;
  border-radius:12px; font:600 14.5px/1 var(--font-sans); color:var(--app-rail-text); cursor:pointer;
  text-align:left; transition:background .15s, color .15s; }
.rail-item:hover { background:var(--app-panel-2); color:var(--app-text); }
.rail-item.active { background:var(--app-rail-active-bg); color:var(--stori-green-active); }
:root[data-theme="dark"] .rail-item.active { color:#00D180; }
.rail-item svg { flex:0 0 auto; }
.rail-foot { font:600 11px/1 var(--font-sans); letter-spacing:.1em; text-transform:uppercase;
  color:var(--app-text-mute); padding:14px 10px 2px; border-top:1px solid var(--app-border-2); }

/* ===================== CONTENT ===================== */
.content { display:flex; flex-direction:column; min-width:0; }
.topbar { display:flex; align-items:center; justify-content:space-between; gap:24px;
  padding:18px 36px; border-bottom:1px solid var(--app-border); background:var(--app-bg);
  position:sticky; top:0; z-index:5; transition:background .25s, border-color .25s; }
.topbar-title { display:flex; align-items:baseline; gap:14px; }
.topbar-title h1 { font:800 26px/1.1 var(--font-sans); color:var(--app-head); letter-spacing:-.01em; }
:root[data-theme="dark"] .topbar-title h1 { color:#fff; }
.period-pill { font:700 12px/1 var(--font-sans); color:var(--stori-green-active); background:var(--app-rail-active-bg);
  padding:6px 11px; border-radius:9999px; }
.topbar-controls { display:flex; align-items:center; gap:12px; }

.scroll-body { scroll-behavior:smooth; }
.page { padding:32px 36px 64px; max-width:1320px; margin:0 auto; }
.view-continuous .section + .section { margin-top:56px; }

/* ===================== SEGMENTED / TOGGLE ===================== */
.seg { display:inline-flex; background:var(--app-panel-2); border:1px solid var(--app-border);
  border-radius:10px; padding:3px; gap:2px; }
.seg-btn { border:0; background:transparent; font:700 13px/1 var(--font-sans); color:var(--app-text-soft);
  padding:7px 14px; border-radius:8px; cursor:pointer; transition:all .15s; }
.seg-btn:hover { color:var(--app-text); }
.seg-btn.active { background:var(--app-panel); color:var(--app-head); box-shadow:var(--app-shadow); }
:root[data-theme="dark"] .seg-btn.active { background:var(--stori-green); color:#00282C; }

.toggle { display:inline-flex; align-items:center; gap:8px; border:0; background:transparent; cursor:pointer; padding:4px 2px; }
.toggle-track { width:34px; height:20px; border-radius:9999px; background:var(--app-border); position:relative; transition:background .18s; }
.toggle-knob { position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.25); transition:transform .18s; }
.toggle.on .toggle-track { background:var(--stori-green); }
.toggle.on .toggle-knob { transform:translateX(14px); }
.toggle-label { font:700 13px/1 var(--font-sans); color:var(--app-text-soft); }
.toggle.on .toggle-label { color:var(--app-text); }

.export-btn { display:inline-flex; align-items:center; gap:7px; border:0; background:var(--stori-green); color:#00282C;
  font:700 13px/1 var(--font-sans); padding:9px 15px; border-radius:10px; cursor:pointer; transition:background .15s; }
.export-btn:hover { background:var(--stori-green-active); color:#fff; }

/* ===================== SECTION / CARD ===================== */
.section-head { margin-bottom:20px; }
.section-head h2 { font:800 22px/1.2 var(--font-sans); color:var(--app-head); letter-spacing:-.01em; }
:root[data-theme="dark"] .section-head h2 { color:#fff; }
.section-sub { font:500 15px/1.4 var(--font-sans); color:var(--app-text-soft); margin-top:5px; }
.card { background:var(--app-panel); border:1px solid var(--app-border); border-radius:20px;
  box-shadow:var(--app-shadow); overflow:hidden; }
.src-note { font:400 12.5px/1.5 var(--font-sans); color:var(--app-text-mute); margin-top:14px; }
.src-note strong { color:var(--app-text-soft); }

/* ===================== KPI CARDS ===================== */
.kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.kpi-card { background:var(--app-panel); border:1px solid var(--app-border); border-radius:18px;
  padding:22px 22px 18px; box-shadow:var(--app-shadow); }
.kpi-label { font:700 13px/1.2 var(--font-sans); color:var(--app-text-soft); letter-spacing:.01em; }
.kpi-value { font:800 38px/1 var(--font-sans); color:var(--app-head); margin:10px 0 8px; letter-spacing:-.02em; }
:root[data-theme="dark"] .kpi-value { color:#fff; }
.kpi-rank { display:inline-flex; align-items:center; gap:5px; font:700 12px/1 var(--font-sans);
  color:var(--app-text-soft); background:var(--app-panel-2); padding:5px 9px; border-radius:9999px; }
.kpi-rank.first { color:var(--stori-green-active); background:var(--app-rail-active-bg); }
:root[data-theme="dark"] .kpi-rank.first { color:#00D180; }
.kpi-rank-sub { font-weight:500; color:var(--app-text-mute); }
.kpi-bars { margin-top:16px; display:flex; flex-direction:column; gap:7px; }
.kpi-bar-row { display:grid; grid-template-columns:54px 1fr 52px; align-items:center; gap:9px; }
.kpi-bar-name { font:700 12px/1 var(--font-sans); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.kpi-bar-track { height:7px; background:var(--app-panel-2); border-radius:9999px; overflow:hidden; }
.kpi-bar-fill { display:block; height:100%; border-radius:9999px; transition:width .3s var(--ease); }
.kpi-bar-val { font:700 12px/1 var(--font-sans); color:var(--app-text-soft); text-align:right; }

.callout { display:flex; gap:14px; margin-top:20px; background:var(--app-panel); border:1px solid var(--app-border);
  border-radius:16px; padding:18px 20px; box-shadow:var(--app-shadow); }
.callout-mark { flex:0 0 4px; align-self:stretch; background:var(--stori-green); border-radius:9999px; }
.callout div { font:500 15px/1.5 var(--font-sans); color:var(--app-text-soft); }
.callout strong { color:var(--app-text); }

/* ===================== CHART TOOLBAR ===================== */
.chart-toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
.ct-right { display:flex; align-items:center; gap:14px; }
.peer-chips { display:flex; flex-wrap:wrap; gap:8px; }
.pchip { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--app-border); background:var(--app-panel);
  border-radius:9999px; padding:6px 13px 6px 10px; font:700 13px/1 var(--font-sans); color:var(--app-text); cursor:pointer; transition:all .15s; }
.pchip:hover { border-color:var(--app-text-mute); }
.pchip-dot { width:9px; height:9px; border-radius:9999px; }
.pchip.off { color:var(--app-text-mute); background:transparent; text-decoration:line-through; }
.pchip.off .pchip-dot { opacity:.3; }

/* ===================== TREND LAYOUT ===================== */
.chart-row { display:grid; grid-template-columns:1fr 200px; gap:20px; align-items:start; }
.chart-card { background:var(--app-panel); border:1px solid var(--app-border); border-radius:20px;
  padding:22px 22px 12px; box-shadow:var(--app-shadow); }
.chart-title-pill { display:inline-block; background:var(--stori-teal); color:#fff; font:800 18px/1 var(--font-sans);
  padding:13px 26px; border-radius:12px; margin:0 auto 18px; }
.chart-card { text-align:center; }
.chart-card .peer-chips { justify-content:center; margin-bottom:8px; }

.yoy-panel { background:var(--app-panel); border:1px solid var(--app-border); border-radius:20px; overflow:hidden; box-shadow:var(--app-shadow); }
.yoy-head { background:var(--stori-teal); color:#fff; font:800 15px/1 var(--font-sans); padding:14px 16px; text-align:center; }
.yoy-list { padding:6px 14px 12px; }
.yoy-row { display:flex; align-items:center; gap:8px; padding:11px 2px; border-bottom:1px solid var(--app-border-2); }
.yoy-row:last-child { border-bottom:0; }
.yoy-dot { width:9px; height:9px; border-radius:9999px; flex:0 0 auto; }
.yoy-name { font:600 13px/1 var(--font-sans); color:var(--app-text-soft); flex:1; }
.yoy-val { font:800 14px/1 var(--font-sans); display:inline-flex; align-items:center; gap:4px; color:var(--app-text); }
.yoy-val.up { color:var(--stori-green-active); }
.yoy-val.down { color:#E2401C; }
.yoy-val .arr { font-size:10px; }

/* ===================== TABLES ===================== */
.tbl-wrap { width:100%; overflow-x:auto; }
.ci-table { width:100%; border-collapse:collapse; font-family:var(--font-sans); }
.ci-table th, .ci-table td { padding:13px 14px; font-size:14.5px; }
.ci-table thead th { font-weight:800; color:var(--app-text); text-align:center; }

/* metrics matrix */
.metrics-table thead th { border-bottom:2px solid var(--app-border); padding-bottom:14px; }
.metrics-table .peer-h { display:inline-flex; align-items:center; }
.metrics-table td { text-align:center; color:var(--app-text); border-bottom:1px solid var(--app-border-2); }
.metrics-table .rowhead-th { width:230px; }
.metrics-table .rowhead { text-align:left; cursor:pointer; user-select:none; color:var(--app-text-soft); font-weight:600; }
.metrics-table .rowhead-inner { display:inline-flex; align-items:center; gap:7px; }
.metrics-table .rowhead:hover { color:var(--app-text); }
.metrics-table .rowhead-active { color:var(--stori-green-active); }
.metrics-table td.col-stori { background:var(--app-rail-active-bg); font-weight:800; }
.metrics-table th.col-stori { background:var(--app-rail-active-bg); border-radius:10px 10px 0 0; }
.metrics-table td.neg { color:#E2401C; }
.metrics-table td.leader { font-weight:800; }
.metrics-table td.leader::after { content:""; }

/* deposit table */
.deposit-table thead th { background:var(--stori-teal); color:#fff; padding:16px 12px; }
.deposit-table thead th:first-child { border-radius:12px 0 0 0; }
.deposit-table thead th:last-child { border-radius:0 12px 0 0; }
.deposit-table thead th.col-stori-head { background:#012b30; box-shadow:inset 0 -3px 0 var(--stori-green); }
.deposit-table td { text-align:center; color:var(--app-text); border-bottom:1px solid var(--app-border-2); }
.deposit-table .rowhead-plain { text-align:left; color:var(--app-text-soft); font-weight:600; cursor:default; }
.deposit-table td.col-stori { background:var(--app-rail-active-bg); }
.deposit-table tr.row-hover td { background:var(--app-panel-2); }
.deposit-table tr.row-hover td.col-stori { background:var(--app-rail-active-bg); }
.deposit-table .na { color:var(--app-text-mute); }
.bool-chip { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:9999px; }
.bool-chip.ok { background:var(--stori-green); }
.bool-chip.no { background:#E5484D; }

/* funding table */
.funding-table { border:1px solid var(--app-border); }
.funding-table thead th { background:var(--stori-teal); color:#fff; padding:16px 14px; border-right:1px solid rgba(255,255,255,.08); }
.funding-table tbody td { border:1px solid var(--app-border-2); vertical-align:middle; text-align:center; color:var(--app-text); }
.funding-table .group-row td { background:#CFEBD7; color:#0B3D2A; font:800 15px/1 var(--font-sans); text-align:center; padding:11px; }
:root[data-theme="dark"] .funding-table .group-row td { background:rgba(0,209,128,.18); color:#fff; }
.funding-table .fund-round { background:var(--app-panel-2); }
.funding-table .fund-round strong { display:block; font-weight:800; }
.funding-table .fund-round em { font-style:italic; font-size:12px; color:var(--app-text-soft); }
.funding-table .ml { white-space:pre-line; }
.funding-table .mono { font-weight:700; }
.funding-table .notes { text-align:left; font-size:13.5px; color:var(--app-text-soft); }

/* ===================== CAPITAL STRUCTURE ===================== */
.cap-card { padding:22px; }
.cap-legend { display:flex; align-items:center; gap:20px; margin-bottom:8px; }
.cap-leg-item { display:inline-flex; align-items:center; gap:8px; font:700 13px/1 var(--font-sans); color:var(--app-text-soft); }
.cap-leg-dot { width:12px; height:12px; border-radius:3px; }
.illus-tag { margin-left:auto; font:700 11px/1 var(--font-sans); letter-spacing:.06em; text-transform:uppercase;
  color:var(--warning-fg); background:var(--warning-bg); padding:5px 10px; border-radius:9999px; }

/* ===================== MONTH RANGE ===================== */
.mrange { display:inline-flex; align-items:center; gap:8px; }
.mrange-lbl { font:700 13px/1 var(--font-sans); color:var(--app-text-soft); }
.mrange select { font:600 13px/1 var(--font-sans); color:var(--app-text); background:var(--app-panel);
  border:1px solid var(--app-border); border-radius:9px; padding:7px 9px; cursor:pointer; }
.mrange-dash { color:var(--app-text-mute); }

/* ===================== FOCUS-MODE single section ===================== */
/* Animate transform only — content is never hidden (base opacity stays 1),
   so a backgrounded/paused frame and the PDF export still show content. */
@media (prefers-reduced-motion: no-preference) {
  .view-focus .section { animation:rise .25s var(--ease) both; }
}
@keyframes rise { from { transform:translateY(8px); } to { transform:none; } }

/* ===================== RESPONSIVE ===================== */
@media (max-width:1100px) {
  .app { grid-template-columns:72px 1fr; }
  .rail-tag, .rail-item span, .rail-foot, .rail-logo { display:none; }
  .rail-item { justify-content:center; }
  .chart-row { grid-template-columns:1fr; }
  .yoy-panel { max-width:none; }
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
}

/* ===================== PRINT / PDF EXPORT ===================== */
@media print {
  @page { size:landscape; margin:14mm; }
  :root[data-theme="dark"] { --app-bg:#fff; --app-panel:#fff; --app-text:#161616; --app-head:#003A40; --app-text-soft:#555; }
  body { background:#fff; }
  .rail, .topbar-controls, .chart-toolbar .ct-right { display:none !important; }
  .app { display:block; height:auto; }
  .content { height:auto; }
  .scroll-body { overflow:visible; }
  .topbar { position:static; border:0; }
  .page { max-width:none; padding:0; }
  .section { break-inside:avoid; page-break-inside:avoid; margin-top:0 !important; padding-top:18px; }
  .section + .section { page-break-before:always; }
  .card, .chart-card, .yoy-panel, .kpi-card { box-shadow:none; }
  .section { animation:none !important; opacity:1 !important; transform:none !important; }
}
</style>
</head>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="data.js"></script>

<script type="text/babel" src="tables.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
